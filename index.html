<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:30px;
font-weight:700;
color:#ff4f8b;
}

nav a{
text-decoration:none;
color:#ddd;
margin-left:25px;
transition:0.3s;
font-size:15px;
}

nav a:hover{
color:#ff4f8b;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:140px 8%;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.hero-content{
max-width:850px;
}

.tag{
display:inline-block;
padding:10px 22px;
border-radius:50px;
background:rgba(255,79,139,0.1);
border:1px solid #ff4f8b;
color:#ff4f8b;
margin-bottom:25px;
font-size:14px;
}

.hero h1{
font-size:65px;
line-height:1.1;
margin-bottom:20px;
}

.hero h1 span{
color:#ff4f8b;
}

.hero p{
color:#cfcfcf;
font-size:17px;
line-height:1.8;
margin-bottom:35px;
}

.hero-btn{
padding:16px 38px;
border:none;
border-radius:50px;
background:#ff4f8b;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.hero-btn:hover{
background:#ff2f73;
transform:translateY(-5px);
}

/* TITLE */

.title{
text-align:center;
margin:90px 0 50px;
}

.title h2{
font-size:42px;
}

.title p{
color:#999;
margin-top:10px;
}
